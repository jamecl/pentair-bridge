<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600"
     font-family="monospace, 'Courier New', sans-serif">

  <!-- Background -->
  <rect width="900" height="600" fill="white"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a1a">
    Pentair RS-485 Bridge — Wiring Diagram
  </text>
  <line x1="60" y1="42" x2="840" y2="42" stroke="#cccccc" stroke-width="1"/>

  <!-- Arrow / marker defs -->
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#555555"/>
    </marker>
    <!-- Resistor symbol path (horizontal, 20px wide) centered on 0,0 -->
    <!-- used via <use> with transform="translate(x,y)" -->
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════
       ESP32 DevKit component box  (left-center)
       Box: x=80, y=70, w=240, h=400
  ════════════════════════════════════════════════════════════════ -->
  <rect x="80" y="70" width="240" height="400" rx="6" ry="6"
        fill="#f0f4ff" stroke="#3355aa" stroke-width="2"/>
  <!-- Component label -->
  <text x="200" y="90" text-anchor="middle" font-size="11" font-weight="bold" fill="#3355aa">ESP32-WROOM-32</text>
  <text x="200" y="105" text-anchor="middle" font-size="10" fill="#3355aa">DevKit (CP2102)</text>

  <!-- USB-C symbol on left edge at top of board -->
  <rect x="57" y="110" width="23" height="14" rx="4" ry="4"
        fill="#dddddd" stroke="#555555" stroke-width="1.5"/>
  <text x="68" y="121" text-anchor="middle" font-size="7" fill="#333333">USB-C</text>
  <!-- USB power arrow into board -->
  <line x1="80" y1="117" x2="92" y2="117" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="55" y="106" text-anchor="middle" font-size="8" fill="#555555">5V IN</text>

  <!-- Divider line inside ESP32 box below title -->
  <line x1="82" y1="112" x2="318" y2="112" stroke="#aabbdd" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- 5V regulator note inside ESP32 box -->
  <rect x="98" y="118" width="164" height="20" rx="3" fill="#dde8ff" stroke="#aabbdd" stroke-width="0.8"/>
  <text x="180" y="132" text-anchor="middle" font-size="8" fill="#3355aa">USB-C 5V → VIN (5V out) + 3.3V LDO</text>

  <!-- ESP32 Pins on RIGHT edge — with connector dots -->

  <!-- VIN (5V) pin -->
  <circle cx="320" cy="160" r="5" fill="#cc2222" stroke="#880000" stroke-width="1.5"/>
  <text x="310" y="157" text-anchor="end" font-size="10" fill="#222">VIN</text>
  <text x="310" y="169" text-anchor="end" font-size="8" fill="#cc2222">(5V)</text>

  <!-- GND pin -->
  <circle cx="320" cy="210" r="5" fill="#222222" stroke="#000000" stroke-width="1.5"/>
  <text x="310" y="214" text-anchor="end" font-size="10" fill="#222">GND</text>

  <!-- 3V3 pin -->
  <circle cx="320" cy="260" r="5" fill="#cc6600" stroke="#884400" stroke-width="1.5"/>
  <text x="310" y="257" text-anchor="end" font-size="10" fill="#222">3V3</text>
  <text x="310" y="269" text-anchor="end" font-size="8" fill="#cc6600">(3.3V)</text>

  <!-- GPIO 16 (RX2) pin -->
  <circle cx="320" cy="320" r="5" fill="#1155cc" stroke="#003388" stroke-width="1.5"/>
  <text x="310" y="317" text-anchor="end" font-size="10" fill="#222">GPIO 16</text>
  <text x="310" y="329" text-anchor="end" font-size="8" fill="#5577cc">(UART2 RX)</text>

  <!-- GPIO 17 (TX2) pin -->
  <circle cx="320" cy="390" r="5" fill="#1155cc" stroke="#003388" stroke-width="1.5"/>
  <text x="310" y="387" text-anchor="end" font-size="10" fill="#222">GPIO 17</text>
  <text x="310" y="399" text-anchor="end" font-size="8" fill="#5577cc">(UART2 TX)</text>

  <!-- ═══════════════════════════════════════════════════════════════
       MAX485 Module component box  (right-center)
       Box: x=560, y=120, w=200, h=320
  ════════════════════════════════════════════════════════════════ -->
  <rect x="560" y="120" width="200" height="320" rx="6" ry="6"
        fill="#f5fff0" stroke="#227733" stroke-width="2"/>
  <text x="660" y="142" text-anchor="middle" font-size="11" font-weight="bold" fill="#227733">ANMBEST MAX485</text>
  <text x="660" y="156" text-anchor="middle" font-size="10" fill="#227733">RS-485 Transceiver</text>
  <line x1="562" y1="162" x2="758" y2="162" stroke="#aaddbb" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- MAX485 left-side pins (face toward ESP32) -->

  <!-- VCC -->
  <circle cx="560" cy="185" r="5" fill="#cc2222" stroke="#880000" stroke-width="1.5"/>
  <text x="572" y="189" text-anchor="start" font-size="10" fill="#222">VCC</text>
  <text x="572" y="200" text-anchor="start" font-size="8" fill="#cc2222">(5V)</text>

  <!-- GND -->
  <circle cx="560" cy="225" r="5" fill="#222222" stroke="#000000" stroke-width="1.5"/>
  <text x="572" y="229" text-anchor="start" font-size="10" fill="#222">GND</text>

  <!-- DI -->
  <circle cx="560" cy="265" r="5" fill="#1155cc" stroke="#003388" stroke-width="1.5"/>
  <text x="572" y="269" text-anchor="start" font-size="10" fill="#222">DI</text>
  <text x="572" y="280" text-anchor="start" font-size="8" fill="#5577cc">(Data In)</text>

  <!-- DE -->
  <circle cx="560" cy="305" r="5" fill="#cc6600" stroke="#884400" stroke-width="1.5"/>
  <text x="572" y="309" text-anchor="start" font-size="10" fill="#222">DE</text>
  <text x="572" y="320" text-anchor="start" font-size="8" fill="#cc6600">(HIGH → always TX)</text>

  <!-- RE -->
  <circle cx="560" cy="345" r="5" fill="#888888" stroke="#444444" stroke-width="1.5"/>
  <text x="572" y="349" text-anchor="start" font-size="10" fill="#222">RE</text>
  <text x="572" y="360" text-anchor="start" font-size="8" fill="#666666">(LOW → always RX)</text>

  <!-- RO -->
  <circle cx="560" cy="390" r="5" fill="#1155cc" stroke="#003388" stroke-width="1.5"/>
  <text x="572" y="394" text-anchor="start" font-size="10" fill="#222">RO</text>
  <text x="572" y="405" text-anchor="start" font-size="8" fill="#5577cc">(Receiver Out, 5V)</text>

  <!-- MAX485 right-side screw terminals -->
  <!-- A terminal -->
  <rect x="758" y="198" width="18" height="18" rx="2" fill="#e8ffe8" stroke="#886600" stroke-width="1.5"/>
  <text x="767" y="211" text-anchor="middle" font-size="10" font-weight="bold" fill="#886600">A</text>

  <!-- B terminal -->
  <rect x="758" y="236" width="18" height="18" rx="2" fill="#e8ffe8" stroke="#118833" stroke-width="1.5"/>
  <text x="767" y="249" text-anchor="middle" font-size="10" font-weight="bold" fill="#118833">B</text>

  <!-- ═══════════════════════════════════════════════════════════════
       Pentair PCBA block (far right)
  ════════════════════════════════════════════════════════════════ -->
  <rect x="820" y="185" width="68" height="80" rx="5" ry="5"
        fill="#fffbe6" stroke="#886600" stroke-width="2"/>
  <text x="854" y="203" text-anchor="middle" font-size="8" font-weight="bold" fill="#886600">Pentair</text>
  <text x="854" y="215" text-anchor="middle" font-size="8" font-weight="bold" fill="#886600">PCBA</text>
  <text x="854" y="227" text-anchor="middle" font-size="8" fill="#886600">RS-485</text>
  <!-- A connector dot -->
  <circle cx="826" cy="207" r="4" fill="#886600" stroke="#664400" stroke-width="1.5"/>
  <text x="835" y="243" text-anchor="start" font-size="8" fill="#886600">A</text>
  <!-- B connector dot -->
  <circle cx="826" cy="245" r="4" fill="#118833" stroke="#006622" stroke-width="1.5"/>
  <text x="835" y="256" text-anchor="start" font-size="8" fill="#118833">B</text>

  <!-- ═══════════════════════════════════════════════════════════════
       WIRES
  ════════════════════════════════════════════════════════════════ -->

  <!-- ── RED wire: ESP32 VIN (5V) → MAX485 VCC ──────────────── -->
  <polyline points="320,160 460,160 460,185 560,185"
            fill="none" stroke="#cc2222" stroke-width="2.5"/>
  <text x="490" y="153" text-anchor="middle" font-size="9" fill="#cc2222" font-weight="bold">5V</text>

  <!-- ── BLACK wire: ESP32 GND → MAX485 GND ─────────────────── -->
  <polyline points="320,210 450,210 450,225 560,225"
            fill="none" stroke="#222222" stroke-width="2.5"/>
  <text x="490" y="220" text-anchor="middle" font-size="9" fill="#333333" font-weight="bold">GND</text>

  <!-- ── BLUE solid wire: GPIO 17 (TX) → MAX485 DI ─────────── -->
  <polyline points="320,390 440,390 440,265 560,265"
            fill="none" stroke="#1155cc" stroke-width="2.5"/>
  <text x="400" y="383" text-anchor="middle" font-size="9" fill="#1155cc" font-weight="bold">TX→DI</text>

  <!-- ── ORANGE wire: ESP32 3V3 → MAX485 DE ────────────────── -->
  <!-- Route: 3V3 pin (320,260) → right elbow → MAX485 DE (560,305) -->
  <polyline points="320,260 470,260 470,305 560,305"
            fill="none" stroke="#cc6600" stroke-width="2.5"/>
  <text x="415" y="254" text-anchor="middle" font-size="9" fill="#cc6600" font-weight="bold">3.3V→DE</text>

  <!-- ── GRAY wire: ESP32 GND → MAX485 RE ──────────────────── -->
  <!-- Branch from GND line elbow at (450,210) → down → RE (560,345) -->
  <!-- Independent run from GND pin for clarity -->
  <polyline points="320,210 442,210 442,345 560,345"
            fill="none" stroke="#888888" stroke-width="2.5"/>
  <text x="400" y="340" text-anchor="middle" font-size="9" fill="#666666" font-weight="bold">GND→RE</text>
  <!-- Tie dot at GND branch -->
  <circle cx="442" cy="210" r="4" fill="#333333"/>
  <!-- Tie dot where main black wire also passes through 450,210 -->

  <!-- ── BLUE dashed wire: MAX485 RO → resistor → GPIO 16 ──── -->
  <!-- RO pin at (560,390), route left to resistor then to GPIO16 at (320,320) -->
  <!-- Wire from RO left to resistor body -->
  <line x1="560" y1="390" x2="420" y2="390"
        fill="none" stroke="#1155cc" stroke-width="2.5" stroke-dasharray="8,3"/>
  <!-- Resistor symbol at ~(400,390): little zigzag box -->
  <rect x="392" y="384" width="28" height="12" rx="2"
        fill="white" stroke="#1155cc" stroke-width="2"/>
  <text x="406" y="394" text-anchor="middle" font-size="7" fill="#1155cc">R</text>
  <!-- Wire continuing from resistor left to elbow, then up to GPIO16 -->
  <line x1="392" y1="390" x2="360" y2="390"
        fill="none" stroke="#1155cc" stroke-width="2.5" stroke-dasharray="8,3"/>
  <polyline points="360,390 360,320 320,320"
            fill="none" stroke="#1155cc" stroke-width="2.5" stroke-dasharray="8,3"/>
  <text x="340" y="358" text-anchor="middle" font-size="9" fill="#1155cc" font-weight="bold">RO→RX</text>

  <!-- ── YELLOW wire: MAX485 A terminal → Pentair PCBA A ─────── -->
  <line x1="776" y1="207" x2="826" y2="207"
        stroke="#cc9900" stroke-width="2.5"/>
  <text x="800" y="200" text-anchor="middle" font-size="9" fill="#886600" font-weight="bold">A (yellow)</text>

  <!-- ── GREEN wire: MAX485 B terminal → Pentair PCBA B ─────── -->
  <line x1="776" y1="245" x2="826" y2="245"
        stroke="#118833" stroke-width="2.5"/>
  <text x="800" y="238" text-anchor="middle" font-size="9" fill="#118833" font-weight="bold">B (green)</text>

  <!-- ═══════════════════════════════════════════════════════════════
       USB-C Power annotation (top-left decorative)
  ════════════════════════════════════════════════════════════════ -->
  <text x="34" y="95" font-size="9" fill="#555555" font-weight="bold">USB-C</text>
  <text x="34" y="106" font-size="9" fill="#555555">5V DC</text>
  <line x1="57" y1="100" x2="57" y2="112" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <!-- ═══════════════════════════════════════════════════════════════
       LEGEND  (bottom-left)
  ════════════════════════════════════════════════════════════════ -->
  <rect x="60" y="492" width="340" height="98" rx="5" ry="5"
        fill="#f9f9f9" stroke="#aaaaaa" stroke-width="1.2"/>
  <text x="75" y="510" font-size="10" font-weight="bold" fill="#333">Wire Color Legend</text>

  <!-- Red -->
  <line x1="75" y1="525" x2="110" y2="525" stroke="#cc2222" stroke-width="3"/>
  <text x="116" y="529" font-size="10" fill="#333">Power — 5V (VIN)</text>

  <!-- Black -->
  <line x1="75" y1="542" x2="110" y2="542" stroke="#222222" stroke-width="3"/>
  <text x="116" y="546" font-size="10" fill="#333">Ground (GND)</text>

  <!-- Blue solid -->
  <line x1="75" y1="559" x2="110" y2="559" stroke="#1155cc" stroke-width="3"/>
  <text x="116" y="563" font-size="10" fill="#333">Data — TX→DI (solid)</text>

  <!-- Blue dashed -->
  <line x1="75" y1="576" x2="110" y2="576" stroke="#1155cc" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="116" y="580" font-size="10" fill="#333">Data — RO→RX (dashed, w/ resistor)</text>

  <!-- Orange -->
  <line x1="230" y1="525" x2="265" y2="525" stroke="#cc6600" stroke-width="3"/>
  <text x="271" y="529" font-size="10" fill="#333">DE tied to 3.3V</text>

  <!-- Gray -->
  <line x1="230" y1="542" x2="265" y2="542" stroke="#888888" stroke-width="3"/>
  <text x="271" y="546" font-size="10" fill="#333">RE tied to GND</text>

  <!-- Yellow -->
  <line x1="230" y1="559" x2="265" y2="559" stroke="#cc9900" stroke-width="3"/>
  <text x="271" y="563" font-size="10" fill="#333">A — RS-485 bus (yellow)</text>

  <!-- Green -->
  <line x1="230" y1="576" x2="265" y2="576" stroke="#118833" stroke-width="3"/>
  <text x="271" y="580" font-size="10" fill="#333">B — RS-485 bus (green)</text>

  <!-- ═══════════════════════════════════════════════════════════════
       Notes box (bottom-right)
  ════════════════════════════════════════════════════════════════ -->
  <rect x="415" y="460" width="468" height="128" rx="5" ry="5"
        fill="#fffdf0" stroke="#ccbb88" stroke-width="1.2"/>
  <text x="430" y="478" font-size="10" font-weight="bold" fill="#664400">Notes</text>
  <text x="430" y="494" font-size="9" fill="#444">• RE/DE hardwired (receive-only config) — GPIO 4 not used physically.</text>
  <text x="430" y="509" font-size="9" fill="#444">• Series resistor on RO protects ESP32 3.3V GPIO from 5V MAX485 output.</text>
  <text x="430" y="524" font-size="9" fill="#444">• A=Yellow wire, B=Green wire on Pentair PCBA RS-485 connector.</text>
  <text x="430" y="539" font-size="9" fill="#444">• USB-C 5V powers ESP32; ESP32 VIN (5V) pin powers MAX485 VCC.</text>
  <text x="430" y="554" font-size="9" fill="#444">• MAX485 VCC=5V; logic levels on A/B bus are 5V differential.</text>
  <text x="430" y="569" font-size="9" fill="#444">• DE=HIGH (always), RE=LOW (always) → half-duplex receive-dominant mode.</text>

  <!-- Bottom caption -->
  <text x="450" y="597" text-anchor="middle" font-size="8" fill="#999999">
    ESP32 UART2: TX=GPIO17 (DI), RX=GPIO16 (RO via resistor) | DE→3.3V, RE→GND (hardwired)
  </text>

</svg>
